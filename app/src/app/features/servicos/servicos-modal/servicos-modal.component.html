<!-- Backdrop -->
<div
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4"
  (click)="fechar.emit()">

  <div
    class="bg-white rounded-xl border border-gray-200 p-7 w-full max-w-sm"
    (click)="$event.stopPropagation()">

    <!-- Cabeçalho -->
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-base font-medium text-gray-900">{{ titulo }}</h2>
      <button
        (click)="fechar.emit()"
        class="text-gray-400 hover:text-gray-600 text-xl leading-none
               cursor-pointer bg-transparent border-none p-0">
        ×
      </button>
    </div>

    <!-- Erro -->
    @if (erro()) {
      <div class="bg-red-50 border border-red-200 rounded-lg px-3 py-2.5 mb-4">
        <p class="text-sm text-red-700">{{ erro() }}</p>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

      @if (isAdmin() && !modoEdicao) {
        <app-filtro-profissional
          [profissionalId]="filtroProfissionalId()" 
          (changed)="onFiltroChange($event)"
          [defaultText]="'--'"/>
      }

      <div>
        <label class="block text-xs text-gray-500 mb-1.5">
          Nome do serviço <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          formControlName="nome"
          placeholder="Ex: Sessão de Psicologia"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-teal-500"
        />
      </div>

      <div>
        <label class="block text-xs text-gray-500 mb-1.5">
          Valor (R$) <span class="text-red-500">*</span>
        </label>
        <input
          type="number"
          formControlName="valor_atual"
          min="0.01"
          step="0.01"
          placeholder="0,00"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                 font-mono focus:outline-none focus:ring-2 focus:ring-teal-500"
        />
      </div>
      
      <div>
        <label class="flex items-center gap-3 p-3 bg-gray-50 border border-gray-200
                      rounded-lg cursor-pointer select-none">
          <div
            class="relative w-9 h-5 rounded-full transition-colors shrink-0"
            [class]="form.controls.pacote.value ? 'bg-teal-600' : 'bg-gray-300'">
            <div
              class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow-sm
                    transition-transform duration-200"
              [class]="form.controls.pacote.value ? 'translate-x-4' : 'translate-x-0.5'">
            </div>
            <input type="checkbox" formControlName="pacote" class="sr-only" />
          </div>
          <div>
            <p class="text-sm font-medium text-gray-800">Pacote de sessões</p>
            <p class="text-xs text-gray-500">Agrupa múltiplas sessões em um único serviço</p>
          </div>
        </label>
      </div>

      <!-- Toggle ativo — só aparece no modo edição -->
      @if (modoEdicao) {
        <label class="flex items-center gap-3 p-3 bg-gray-50 border border-gray-200
                      rounded-lg cursor-pointer select-none">
          <div
            class="relative w-9 h-5 rounded-full transition-colors shrink-0"
            [class]="form.controls['ativo'].value ? 'bg-teal-600' : 'bg-gray-300'">
            <div
              class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow-sm
                     transition-transform duration-200"
              [class]="form.controls['ativo'].value ? 'translate-x-4' : 'translate-x-0.5'">
            </div>
            <!-- input invisível para acessibilidade -->
            <input
              type="checkbox"
              formControlName="ativo"
              class="sr-only"
            />
          </div>
          <div>
            <p class="text-sm font-medium text-gray-800">
              {{ form.controls['ativo'].value ? 'Serviço ativo' : 'Serviço inativo' }}
            </p>
            <p class="text-xs text-gray-500">Aparece na criação de agendamentos</p>
          </div>
        </label>
      }

      <!-- Ações -->
      <div class="flex gap-2.5 mt-2">
        <button
          type="button"
          (click)="fechar.emit()"
          class="flex-1 border border-gray-200 rounded-lg py-2.5 text-sm
                 text-gray-700 hover:bg-gray-50 transition-colors cursor-pointer">
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="flex-1 bg-teal-600 hover:bg-teal-700 disabled:opacity-50
                 text-white text-sm font-medium rounded-lg py-2.5
                 transition-colors cursor-pointer disabled:cursor-not-allowed">
          {{ loading() ? 'Salvando...' : labelBotao }}
        </button>
      </div>

    </form>
  </div>
</div>
