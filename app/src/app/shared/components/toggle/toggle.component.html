<label class="inline-flex items-center gap-2.5 cursor-pointer select-none">
  <button
    type="button"
    role="switch"
    [attr.aria-checked]="checked()"
    [disabled]="disabled()"
    (click)="onToggle()"
    [class]="checked() ? 'bg-[#BCA8A5]' : 'bg-gray-200'"
    class="relative w-9 h-5 rounded-full transition-colors
      focus:outline-none focus:ring-2 focus:ring-[#BCA8A5] focus:ring-offset-1
      disabled:opacity-50 disabled:cursor-not-allowed">
    <span
      [class]="checked() ? 'translate-x-4' : 'translate-x-0'"
      class="absolute top-0.5 left-0.5 inline-block w-4 h-4 bg-white rounded-full
        shadow-sm transition-transform duration-200">
    </span>
  </button>
  @if (label()) {
    <span class="text-sm text-gray-600">{{ label() }}</span>
  }
</label>
